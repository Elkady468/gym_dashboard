name: gym_admin
description: FalconGym Admin Dashboard — Web & Tablet
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5

  # Networking
  dio: ^5.3.3
  pretty_dio_logger: ^1.3.1

  # Dependency Injection
  get_it: ^7.6.4

  # Local Storage
  shared_preferences: ^2.2.2

  # Routing
  go_router: ^12.1.3

  # UI
  fl_chart: ^0.65.0
  intl: ^0.18.1
  data_table_2: ^2.5.12
  shimmer: ^3.0.0
  flutter_animate: ^4.2.0+1

  # Functional
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
